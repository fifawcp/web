<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- White rounded chip backdrop — mirrors the `Brand` lockup's
       `bg-white rounded-lg` mark so the favicon reads consistently
       against both light and dark browser/tab surfaces. -->
