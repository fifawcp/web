<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 750" width="300" height="750">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');
    ]]></style>
  </defs>

  <!-- Nunito Black cap-height ≈ 71.4% of em → at font-size 350 → 250 px     -->
  <!-- Baselines at 250 / 500 / 750 so bottom of each digit = top of next     -->

  <!-- Row 1 · change fill="#…" to recolour -->
  <text id="two-1"
        x="150" y="250"
        font-family="'Nunito', 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif"
        font-weight="900"
        font-size="350"
        text-anchor="middle"
        fill="#000000">2</text>

  <!-- Row 2 -->
  <text id="two-2"
        x="150" y="500"
        font-family="'Nunito', 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif"
        font-weight="900"
        font-size="350"
        text-anchor="middle"
        fill="#000000">2</text>

  <!-- Row 3 -->
  <text id="two-3"
        x="150" y="750"
        font-family="'Nunito', 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif"
        font-weight="900"
        font-size="350"
        text-anchor="middle"
        fill="#000000">2</text>
</svg>
